        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .logo {
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-right: 30px;
            cursor: pointer;
        }

        .search-container {
            flex-grow: 1;
            max-width: 500px;
            display: flex;
        }

        #search-input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #3498db;
            border-radius: 25px 0 0 25px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        #search-button {
            padding: 0 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        #search-button:hover {
            background-color: #2980b9;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .modal-body {
            flex-grow: 1;
            overflow-y: auto;
        }

        .result-item {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            transition: background-color 0.3s;
            cursor: pointer;
        }

        .result-item:hover {
            background-color: #f5f5f5;
        }

        /* 文档查看器样式 */
        .doc-viewer {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100% - 70px);
            background-color: white;
            z-index: 1500;
            padding: 20px;
            overflow-y: auto;
        }

        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .doc-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .close-doc {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .doc-content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Markdown样式 */
        .doc-content h1,
        .doc-content h2,
        .doc-content h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            color: #333;
        }

        .doc-content p {
            margin-bottom: 1em;
        }

        .doc-content pre {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .doc-content code {
            font-family: Consolas, Monaco, 'Andale Mono', monospace;
            background-color: #f5f5f5;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .doc-content blockquote {
            border-left: 4px solid #3498db;
            padding-left: 15px;
            margin-left: 0;
            color: #666;
        }

        /* 主内容样式 */
        .title-box {
            position: fixed;
            top: 200px;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;
        }

        .title {
            font-family: Arial, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        .links-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;
        }

        .chat-box {
            position: fixed;
            top: 75%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;

        a {
            color: #3498db;
            text-decoration: none;
            background-image: linear-gradient(to right, #3498db, #3498db);
            background-size: 0 2px;
            background-position: 0 100%;
            background-repeat: no-repeat;
            transition: background-size 0.3s ease;
            padding-bottom: 2px;
        }

        a:hover {
            background-size: 100% 2px;
        }

        .loading {
            display: none;
            margin: 20px 0;
            text-align: center;
        }

        .error {
            color: #e74c3c;
            margin: 20px 0;
            text-align: center;
        }

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const searchInput = document.getElementById('search-input');
            const searchButton = document.getElementById('search-button');
            const resultsContainer = document.getElementById('results');
            const loadingElement = document.getElementById('loading');
            const errorElement = document.getElementById('error');
            const searchModal = document.getElementById('search-modal');
            const closeModal = document.querySelector('.close-modal');
            const docViewer = document.getElementById('doc-viewer');
            const docTitle = document.getElementById('doc-title');
            const docContent = document.getElementById('doc-content');
            const closeDoc = document.getElementById('close-doc');
            const homeButton = document.getElementById('home-button');
            const mainContent = document.getElementById('main-content');

            // 配置Marked.js以支持KaTeX
            marked.setOptions({
                breaks: true,
                highlight: function (code, lang) {
                    return code;
                }
            });

            // 渲染KaTeX公式
            function renderMath() {
                renderMathInElement(docContent, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
                });
            }

            // 显示模态框
            function showModal() {
                searchModal.style.display = 'flex';
            }

            // 隐藏模态框
            function hideModal() {
                searchModal.style.display = 'none';
            }

            // 显示文档查看器
            function showDocViewer(title) {
                docTitle.textContent = title;
                docViewer.style.display = 'block';
                mainContent.style.display = 'none';
            }

            // 隐藏文档查看器
            function hideDocViewer() {
                docViewer.style.display = 'none';
                mainContent.style.display = 'block';
            }

            // 加载并渲染文档
            async function loadAndRenderDoc(url, title) {
                showDocViewer(title);
                docContent.innerHTML = '<div class="loading">正在加载文档...</div>';

                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error('文档加载失败');
                    }
                    const markdown = await response.text();
                    docContent.innerHTML = marked.parse(markdown);
                    renderMath();
                } catch (error) {
                    docContent.innerHTML = `<div class="error">加载文档时出错: ${error.message}</div>`;
                }
            }

            // 点击模态框外部关闭
            searchModal.addEventListener('click', function (e) {
                if (e.target === searchModal) {
                    hideModal();
                }
            });

            // 点击关闭按钮关闭
            closeModal.addEventListener('click', hideModal);

            // 点击关闭文档按钮
            closeDoc.addEventListener('click', hideDocViewer);

            // 点击首页按钮
            homeButton.addEventListener('click', hideDocViewer);

            // 模拟GitHub API搜索
            function searchGitHubFiles(query) {
                showModal();
                loadingElement.style.display = 'block';
                errorElement.textContent = '';
                resultsContainer.innerHTML = '';

                // 模拟延迟
                setTimeout(() => {
                    try {
                        // 模拟搜索结果
                        const mockResults = [
                            {
                                name: 'Deepseek-1.md',
                                path: 'Deepseek-1.md',
                                html_url: 'https://hub.gitmirror.com/https://raw.githubusercontent.com/zhangyimin12345/zhangyimin12345.github.io/main/Deepseek-1.md',
                                title: 'DeepSeek | 中文官网、DeepSeek网页版、API 调用和本地部署教程 | 最全使用指南~ 【2025年4月更新】'
                            },
                        ].filter(item =>
                            item.name.toLowerCase().includes(query.toLowerCase()) ||
                            item.path.toLowerCase().includes(query.toLowerCase())
                        );

                        if (mockResults.length === 0) {
                            resultsContainer.innerHTML = '<div class="result-item">没有找到匹配的文件</div>';
                        } else {
                            mockResults.forEach(result => {
                                const item = document.createElement('div');
                                item.className = 'result-item';
                                item.textContent = result.path;
                                item.addEventListener('click', () => {
                                    hideModal();
                                    loadAndRenderDoc(result.html_url, result.title);
                                });
                                resultsContainer.appendChild(item);
                            });
                        }

                        loadingElement.style.display = 'none';
                    } catch (error) {
                        loadingElement.style.display = 'none';
                        errorElement.textContent = '搜索时出错: ' + error.message;
                    }
                }, 800);
            }

            // 搜索按钮点击事件
            searchButton.addEventListener('click', function () {
                const query = searchInput.value.trim();
                if (query) {
                    searchGitHubFiles(query);
                }
            });

            // 回车键搜索
            searchInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    if (query) {
                        searchGitHubFiles(query);
                    }
                }
            });

                        movey = Math.round((Math.random() * 1 - 0.5) * (this._height * 0.25));
                        point3 = new Point();
                        point3.copy(point2);
                        if (dir === "right") {
                            point3.add(movex, movey);
                            if (point2.x >= max) break;
                        } else if (dir === "left") {
                            point3.subtract(movex, movey);
                            if (point2.x <= min) break;
                        }
                        ribbon.push({
                            point1: new Point(point1.x, point1.y),
                            point2: new Point(point2.x, point2.y),
                            point3: point3,
                            color: color,
                            delay: delay,
                            dir: dir,
                            alpha: 0,
                            phase: 0

                                    section.point2.add(mod, 0);
                                    section.point3.add(mod, 0);
                                } else {
                                    section.point1.subtract(mod, 0);
                                    section.point2.subtract(mod, 0);
                                    section.point3.subtract(mod, 0);

                                section.point1.add(0, mod);
                                section.point2.add(0, mod);

                        }
                        this._context.beginPath();
                        this._context.moveTo(section.point1.x, section.point1.y);
                        this._context.lineTo(section.point2.x, section.point2.y);
                        this._context.lineTo(section.point3.x, section.point3.y);
                        this._context.fillStyle = c;
                        this._context.fill();
                        if (this._options.strokeSize > 0) {
                            this._context.lineWidth = this._options.strokeSize;
                            this._context.strokeStyle = c;
                            this._context.lineCap = "round";
                            this._context.stroke();

                    return false;
                }, _onDraw: function () {
                    for (var i = 0, t = this._ribbons.length; i < t; ++i) {
                        if (!this._ribbons[i]) {
                            this._ribbons.splice(i, 1);
                        }
                    }
                    this._context.clearRect(0, 0, this._width, this._height);
                    for (var a = 0; a < this._ribbons.length; ++a) {
                        var ribbon = this._ribbons[a], numSections = ribbon.length, numDone = 0;
                        for (var b = 0; b < numSections; ++b) {
                            if (this._drawRibbonSection(ribbon[b])) {
                                numDone++;
                            }

                        if (numDone >= numSections) {
                            this._ribbons[a] = null;
                        }
                    }
                    if (this._ribbons.length < this._options.ribbonCount) {
                        this.addRibbon();
                    }
                    requestAnimationFrame(this._onDraw);
                }, _onResize: function (e) {
                    var screen = screenInfo(e);
                    this._width = screen.width;
                    this._height = screen.height;
                    if (this._canvas) {
                        this._canvas.width = this._width;
                        this._canvas.height = this._height;
                        if (this._context) {
                            this._context.globalAlpha = this._options.colorAlpha;
                        }
                    }
                }, _onScroll: function (e) {
                    var screen = screenInfo(e);
                    this._scroll = screen.scrolly;
                }
            };
            return Factory;
        });
        new Ribbons();
    </script>
    <!--网格动态背景开始-->
    <script type="text/javascript">
        !function () {
            //封装方法，压缩之后减少文件大小
            function get_attribute(node, attr, default_value) {
                return node.getAttribute(attr) || default_value;
            }

            //封装方法，压缩之后减少文件大小
            function get_by_tagname(name) {
                return document.getElementsByTagName(name);
            }

            //获取配置参数
            function get_config_option() {
                var scripts = get_by_tagname("script"),
                    script_len = scripts.length,
                    script = scripts[script_len - 1]; //当前加载的script
                return {
                    l: script_len, //长度，用于生成id用
                    z: get_attribute(script, "zIndex", -1), //z-index
                    o: get_attribute(script, "opacity", 0.8), //opacity
                    c: get_attribute(script, "color", "255,255,255"), //color
                    n: get_attribute(script, "count", 350) //count
                };
            }

                canvas_width = the_canvas.width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth,
                    canvas_height = the_canvas.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
            }

            //绘制过程
            function draw_canvas() {
                context.clearRect(0, 0, canvas_width, canvas_height);
                //随机的线条和当前位置联合数组
                var e, i, d, x_dist, y_dist, dist; //临时节点
                //遍历处理每一个点
                random_points.forEach(function (r, idx) {
                    r.x += r.xa,
                        r.y += r.ya, //移动
                        r.xa *= r.x > canvas_width || r.x < 0 ? -1 : 1,
                        r.ya *= r.y > canvas_height || r.y < 0 ? -1 : 1, //碰到边界，反向反弹
                        context.fillRect(r.x - 0.5, r.y - 0.5, 1, 1); //绘制一个宽高为1的点
                    //从下一个点开始
                    for (i = idx + 1; i < all_array.length; i++) {
                        e = all_array[i];
                        // 当前点存在
                        if (null !== e.x && null !== e.y) {
                            x_dist = r.x - e.x; //x轴距离 l
                            y_dist = r.y - e.y; //y轴距离 n
                            dist = x_dist * x_dist + y_dist * y_dist; //总距离, m

                            dist < e.max && (e === current_point && dist >= e.max / 2 && (r.x -= 0.03 * x_dist, r.y -= 0.03 * y_dist), //靠近的时候加速
                                d = (e.max - dist) / e.max,
                                context.beginPath(),
                                context.lineWidth = d / 2,
                                context.strokeStyle = "#000000",
                                context.moveTo(r.x, r.y),
                                context.lineTo(e.x, e.y),
                                context.stroke());
                        }

                context = the_canvas.getContext("2d"), canvas_width, canvas_height,

                    window.setTimeout(func, 1000 / 40);
                }, random = Math.random,
                current_point = {
                    x: null, //当前鼠标x
                    y: null, //当前鼠标y
                    max: 20000 // 圈半径的平方
                },
                all_array;
            the_canvas.id = canvas_id;
            the_canvas.style.cssText = "position:fixed;top:0;left:0;z-index:" + config.z + ";opacity:" + config.o;
            get_by_tagname("body")[0].appendChild(the_canvas);

            //初始化画布大小
            set_canvas_size();
            window.onresize = set_canvas_size;
            //当时鼠标位置存储，离开的时候，释放当前位置信息
            window.onmousemove = function (e) {
                e = e || window.event;
                current_point.x = e.clientX;
                current_point.y = e.clientY;
            }, window.onmouseout = function () {

                current_point.y = null;
            };

            for (var random_points = [], i = 0; config.n > i; i++) {
                var x = random() * canvas_width, //随机位置
                    y = random() * canvas_height,
                    xa = 2 * random() - 1, //随机运动方向
                    ya = 2 * random() - 1;
                // 随机点
                random_points.push({
                    x: x,
                    y: y,
                    xa: xa,
                    ya: ya,
                    max: 6000 //沾附距离
                });
            }
            all_array = random_points.concat([current_point]);
            //0.1秒后绘制
            setTimeout(function () {
                draw_canvas();
            }, 100);
        }();
    </script>
